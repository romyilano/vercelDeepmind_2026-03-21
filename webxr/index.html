<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>XR Scene — Generated by Gemini Agent</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <style>
    #scene-menu {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #menu-toggle {
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    #menu-toggle:hover { background: rgba(0,0,0,0.85); }
    #scene-list {
      display: none;
      margin-top: 8px;
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 0;
      min-width: 200px;
      max-height: 300px;
      overflow-y: auto;
    }
    .scene-item {
      display: block;
      padding: 8px 16px;
      color: #ccc;
      text-decoration: none;
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .scene-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .scene-item.active { color: #FFD6E0; font-weight: bold; }
  </style>
</head>
<body>
  <!-- Scene menu -->
  <div id="scene-menu">
    <button id="menu-toggle">Scenes</button>
    <div id="scene-list">
      <button class="scene-item active" data-scene="scene_001">place a bruja in the scene</button>
      <button class="scene-item" data-scene="scene_002">place bruja</button>
      <button class="scene-item" data-scene="scene_003">All models</button>
      <button class="scene-item" data-scene="scene_004">All models</button>
    </div>
  </div>

  <a-scene>
    <!-- Assets (must come first for preloading) -->
    <a-assets>
      <img id="sky-texture" src="punk_house.png" crossorigin="anonymous">
      <a-asset-item id="model-bruja" src="bruja.glb"></a-asset-item>
      <a-asset-item id="model-punkgirl" src="punkgirl.glb"></a-asset-item>
      <a-asset-item id="model-world" src="world.glb"></a-asset-item>
    </a-assets>

    <!-- 360 panorama sphere — pastel pink fallback if no image loads -->
    <a-sky src="#sky-texture" color="#FFD6E0"></a-sky>

    <!-- Lighting — strong, even illumination for model visibility -->
    <a-entity light="type: ambient; color: #fff; intensity: 2.0"></a-entity>
    <a-entity light="type: directional; color: #fff; intensity: 2.5" position="-2 4 2"></a-entity>
    <a-entity light="type: directional; color: #ffd6e0; intensity: 1.2" position="2 3 -1"></a-entity>
    <a-entity light="type: hemisphere; color: #fff; groundColor: #ffd6e0; intensity: 1.5"></a-entity>

    <!-- Generated entities container -->
    <a-entity id="scene-entities">
    <a-gltf-model src="#model-bruja" position="0.0 0.5 -3.0" title="bruja"></a-gltf-model>
    <a-gltf-model src="#model-punkgirl" position="3.0 0.5 -3.0" title="punkgirl"></a-gltf-model>
    <a-gltf-model src="#model-world" position="6.0 0.5 -3.0" title="world"></a-gltf-model>
    </a-entity>

    <!-- Camera rig — standing height, facing models -->
    <a-entity id="rig" position="0 0 4">
      <a-camera position="0 1.6 0" look-controls wasd-controls></a-camera>
    </a-entity>
  </a-scene>

  <script>
    // Scene menu toggle
    const menuToggle = document.getElementById('menu-toggle');
    const sceneList = document.getElementById('scene-list');
    if (menuToggle && sceneList) {
      menuToggle.addEventListener('click', () => {
        sceneList.style.display = sceneList.style.display === 'none' ? 'block' : 'none';
      });
      // Press M to toggle menu
      document.addEventListener('keydown', (e) => {
        if (e.key === 'm' || e.key === 'M') {
          sceneList.style.display = sceneList.style.display === 'none' ? 'block' : 'none';
        }
      });
    }

    // Scene switching
    async function loadScene(sceneId) {
      try {
        const resp = await fetch('scenes/' + sceneId + '.json');
        if (!resp.ok) return;
        const scene = await resp.json();

        // Remove existing models
        const container = document.getElementById('scene-entities');
        while (container.firstChild) container.removeChild(container.firstChild);

        // Add new models
        const chars = scene.characters || [];
        for (const char of chars) {
          const el = document.createElement('a-gltf-model');
          const asset = char.asset || 'character';
          el.setAttribute('src', asset + '.glb');
          const pos = char.position || [0, 1, -3];
          const y = pos[1] < 0.5 ? 0.5 : pos[1];
          el.setAttribute('position', pos[0] + ' ' + y + ' ' + pos[2]);
          container.appendChild(el);
        }

        // Update active menu item
        document.querySelectorAll('.scene-item').forEach(item => {
          item.classList.toggle('active', item.dataset.scene === sceneId);
        });
      } catch (err) {
        console.error('Failed to load scene:', err);
      }
    }

    document.querySelectorAll('.scene-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        loadScene(item.dataset.scene);
      });
    });
  </script>
</body>
</html>
